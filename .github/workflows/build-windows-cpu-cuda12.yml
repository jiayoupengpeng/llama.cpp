name: Build Windows CPU + CUDA12
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-cpu:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSVC VS2022
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build CPU Release
        run: |
          Remove-Item -Recurse -Force build-cpu -ErrorAction SilentlyContinue
          cmake -B build-cpu -DCMAKE_BUILD_TYPE=Release
          cmake --build build-cpu --config Release -j4

      - name: Package CPU binaries
        run: |
          mkdir artifact-cpu
          Copy-Item build-cpu/bin/Release/* artifact-cpu/ -Recurse
          Compress-Archive -Path artifact-cpu/* -DestinationPath llama-win-cpu-mcp.zip

      - name: Upload CPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-win-cpu-mcp
          path: llama-win-cpu-mcp.zip

  build-cuda12:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSVC VS2022
        uses: ilammy/msvc-dev-cmd@v1

      # 替换为永远不会找不到仓库的社区稳定CUDA安装Action
      - name: Install CUDA 12.6 Toolkit
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: "12.6"
          method: network
          sub-packages: '["nvcc","cudart","cublas","cublas_dev"]'

      - name: Build CUDA12 Release
        run: |
          Remove-Item -Recurse -Force build-cuda -ErrorAction SilentlyContinue
          cmake -B build-cuda ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DGGML_CUDA=ON ^
            -DGGML_CUDA_F16=ON
          cmake --build build-cuda --config Release -j4

      - name: Package CUDA12 binaries
        run: |
          mkdir artifact-cuda
          Copy-Item build-cuda/bin/Release/* artifact-cuda/ -Recurse
          Compress-Archive -Path artifact-cuda/* -DestinationPath llama-win-cuda12-mcp.zip

      - name: Upload CUDA12 artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-win-cuda12-mcp
          path: llama-win-cuda12-mcp.zip
