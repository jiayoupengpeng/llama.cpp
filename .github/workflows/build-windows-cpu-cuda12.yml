name: Build Windows CPU + CUDA12 (Official Aligned Final Fixed)
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-windows-cpu-cuda12.yml'
      - '**/CMakeLists.txt'
      - '**/.cmake'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
      - '**/*.cpp'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  GGML_NLOOP: 3
  GGML_N_THREADS: 1
  LLAMA_ARG_LOG_COLORS: 1
  LLAMA_ARG_LOG_PREFIX: 1
  LLAMA_ARG_LOG_TIMESTAMPS: 1

jobs:
  build-cpu-x64:
    runs-on: windows-2022
    steps:
      - name: Clone source code
        uses: actions/checkout@v6

      - name: ccache compile cache speedup
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: cpu-windows-x64-static
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

      - name: Install Ninja build tool
        run: choco install ninja -y

      - name: CMake Build CPU (Enable llama-server & full MCP)
        run: |
          Remove-Item -Recurse -Force build-cpu -ErrorAction SilentlyContinue
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build-cpu ^
            -G "Ninja Multi-Config" ^
            -DGGML_NATIVE=OFF ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_RPC=ON ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_CPU_ALL_VARIANTS=ON
          cmake --build build-cpu --config Release -j %NUMBER_OF_PROCESSORS%

      - name: CTest basic functional test
        run: |
          cd build-cpu
          ctest -L main -C Release --verbose --timeout 900

      - name: Package CPU release zip
        run: |
          mkdir artifact-cpu
          Copy-Item build-cpu/bin/Release/* artifact-cpu/ -Recurse
          Compress-Archive -Path artifact-cpu/* -DestinationPath llama-win-cpu-mcp.zip

      - name: Upload CPU build artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-win-cpu-mcp
          path: llama-win-cpu-mcp.zip

  build-cuda12-x64:
    runs-on: windows-2022
    strategy:
      matrix:
        cuda_ver: ['12.6']
    steps:
      - name: Clone source code
        uses: actions/checkout@v6

      - name: ccache compile cache speedup
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: cuda-windows-x64-${{ matrix.cuda_ver }}
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

      - name: Install Ninja build tool
        run: choco install ninja -y

      - name: Install CUDA ${{ matrix.cuda_ver }} Toolkit
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: ${{ matrix.cuda_ver }}
          method: network
          sub-packages: '["nvcc","cudart","cublas","cublas_dev"]'

      - name: CMake Build CUDA (Enable llama-server & full MCP)
        run: |
          Remove-Item -Recurse -Force build-cuda -ErrorAction SilentlyContinue
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build-cuda ^
            -G "Ninja Multi-Config" ^
            -DGGML_NATIVE=OFF ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_RPC=ON ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_CPU_ALL_VARIANTS=ON ^
            -DGGML_CUDA=ON ^
            -DGGML_CUDA_CUB_3DOT2=ON
          cmake --build build-cuda --config Release -j %NUMBER_OF_PROCESSORS%

      - name: CTest basic functional test
        run: |
          cd build-cuda
          ctest -L main -C Release --verbose --timeout 900

      - name: Package CUDA release zip
        run: |
          mkdir artifact-cuda
          Copy-Item build-cuda/bin/Release/* artifact-cuda/ -Recurse
          Compress-Archive -Path artifact-cuda/* -DestinationPath llama-win-cuda12-mcp.zip

      - name: Upload CUDA build artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-win-cuda12-mcp
          path: llama-win-cuda12-mcp.zip
